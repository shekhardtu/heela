#cloud-config
#
# First-boot bootstrap for edge-N (Hetzner CX23, Ubuntu 24.04).
#
# Design decisions:
#   - Install Caddy 2.8+ from the official Cloudsmith apt repo. Stock Caddy is
#     enough for Phase 1 — on_demand_tls is native, no custom modules needed.
#   - Firewall locked down to 22/80/443 via UFW.
#   - fail2ban + unattended-upgrades for unattended security posture.
#   - Idempotent runcmd: `set -e` plus explicit user creation as a safety belt
#     in case the apt postinst races with systemctl enable (we hit this on the
#     first provision — caddy user wasn't ready when the service tried to
#     start).
#   - DEBIAN_FRONTEND=noninteractive + Dpkg::Options force-confdef to skip the
#     conffile prompt that caused the first install to land in `iU` state.
#
# Ready-signal: curl http://<ip>/_healthz should return "ok" within ~90s.

hostname: edge-1

package_update: true
package_upgrade: true

packages:
  - ufw
  - curl
  - gpg
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https
  - fail2ban
  - unattended-upgrades
  - jq

write_files:
  - path: /etc/caddy/Caddyfile
    owner: root:root
    permissions: "0644"
    content: |
      # Placeholder — replaced by the real Caddyfile once DNS is wired.
      # Responds 200 on /_healthz so boot-time health checks pass.
      :80 {
        @healthz path /_healthz
        handle @healthz {
          respond "ok" 200
        }
        handle {
          respond "edge-1 alive — placeholder, awaiting config" 200
        }
      }

  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled  = true
      bantime  = 1h
      findtime = 10m
      maxretry = 5

  - path: /etc/apt/apt.conf.d/50unattended-upgrades-edge
    owner: root:root
    permissions: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";

  - path: /etc/apt/apt.conf.d/99-noninteractive-confdef
    owner: root:root
    permissions: "0644"
    content: |
      Dpkg::Options {
        "--force-confdef";
        "--force-confold";
      };

runcmd:
  # ── Ensure caddy user exists BEFORE we try to start the service ───────────
  # (Defensive — the apt package postinst should do this, but it can race.)
  - getent group caddy || groupadd --system caddy
  - getent passwd caddy || useradd --system --gid caddy --create-home --home-dir /var/lib/caddy --shell /usr/sbin/nologin --comment "Caddy web server" caddy
  # ── Caddy install (official Cloudsmith repo) ──────────────────────────────
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' -o /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" caddy
  # ── Firewall ──────────────────────────────────────────────────────────────
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  # ── Services ──────────────────────────────────────────────────────────────
  - systemctl enable --now fail2ban
  - systemctl enable caddy
  - systemctl restart caddy
  # ── Success signal ────────────────────────────────────────────────────────
  - echo "cloud-init finished at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /var/log/edge-bootstrap.log
